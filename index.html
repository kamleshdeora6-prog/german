<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>German Study App</title>

<style>

/* =========================
THEMES
========================= */

:root{
  --bg:#0b0f14;
  --card:#121824;
  --text:#e6eaf2;
  --muted:#98a2b3;
  --line:#263042;
  --panel:#0f1520;
  --btn:#1e293b;
  --btnText:#ffffff;
  --accent:#60a5fa;
  --good:#22c55e;
  --bad:#ef4444;
}

body.theme-light{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111;
  --muted:#5b6470;
  --line:#d7dde6;
  --panel:#f1f3f7;
}

body.theme-dark{
  --bg:#0b0f14;
  --card:#121824;
  --text:#e6eaf2;
  --muted:#98a2b3;
  --line:#263042;
  --panel:#0f1520;
}

body.theme-vibrant{
  --bg:#f6f8ff;
  --card:#ffffff;
  --text:#0b1020;
  --muted:#55607a;
  --line:#dfe6ff;
  --panel:#f0f4ff;
  --accent:#ec4899;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:16px;
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  background:var(--bg);
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:16px;
  margin:16px;
  border-radius:12px;
}

textarea,input,select{
  width:100%;
  background:var(--panel);
  border:1px solid var(--line);
  color:var(--text);
  padding:10px;
  border-radius:8px;
  margin-top:8px;
}

button{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid var(--line);
  background:var(--btn);
  color:white;
  cursor:pointer;
}

.tabs button{margin-right:8px}

.hidden{display:none}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.small{
  font-size:13px;
  color:var(--muted);
}

.badge{
  border:1px solid var(--line);
  padding:4px 8px;
  border-radius:999px;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table td,.table th{
  border:1px solid var(--line);
  padding:8px;
}

.hl{
  background:#ffd6f0;
}

.flashcard{
  padding:20px;
  text-align:center;
  border:1px solid var(--line);
  border-radius:12px;
  cursor:pointer;
}

</style>
</head>

<body class="theme-vibrant">

<header>

<h2>German Study App</h2>

<div class="row">

<button onclick="showTab('practiceTab')">Practice</button>
<button onclick="showTab('libraryTab')">Library</button>
<button onclick="showTab('notesTab')">Notes</button>
<button onclick="showTab('flashcardsTab')">Flashcards</button>
<button onclick="showTab('translatorTab')">Translator</button>
<button onclick="showTab('tablesTab')">Grammar</button>

<select onchange="setTheme(this.value)">
<option value="theme-vibrant">Vibrant</option>
<option value="theme-dark">Dark</option>
<option value="theme-light">Light</option>
</select>

</div>

</header>

<!-- ===================== PRACTICE ===================== -->

<div id="practiceTab" class="card">

<h3>Typing Practice</h3>

<select id="practiceSelect"></select>

<textarea id="referenceArea" readonly></textarea>

<textarea id="practiceArea" placeholder="Type here..." oninput="updateStats()"></textarea>

<div class="row">
<span class="badge">WPM: <span id="wpm">0</span></span>
<span class="badge">Accuracy: <span id="acc">0</span>%</span>
</div>

</div>


<!-- ===================== LIBRARY ===================== -->

<div id="libraryTab" class="card hidden">

<h3>Library</h3>

<textarea id="germanInput" placeholder="German"></textarea>
<textarea id="englishInput" placeholder="English"></textarea>

<button onclick="saveParagraphLocal()">Save locally</button>

<div id="libraryList"></div>

</div>


<!-- ===================== NOTES ===================== -->

<div id="notesTab" class="card hidden">

<h3>Notes</h3>

<select id="notesTopic"></select>

<textarea id="notesArea" readonly></textarea>

<hr>

<h3>Personal Notes</h3>

<textarea id="personalNotesArea"></textarea>

<button onclick="savePersonalNotes()">Save</button>

</div>


<!-- ===================== FLASHCARDS ===================== -->

<div id="flashcardsTab" class="card hidden">

<h3>Flashcards</h3>

<div id="flashcard" class="flashcard" onclick="flipCard()">
<div id="fcText">Loading...</div>
</div>

<button onclick="nextCard()">Next</button>

</div>


<!-- ===================== TRANSLATOR ===================== -->

<div id="translatorTab" class="card hidden">

<h3>Translator</h3>

<select id="langFrom">
<option value="de">German</option>
<option value="en">English</option>
</select>

<select id="langTo">
<option value="en">English</option>
<option value="de">German</option>
</select>

<textarea id="translateInput"></textarea>

<button onclick="translateText()">Translate</button>

<textarea id="translateOutput"></textarea>

<hr>

<h3>Dictionary</h3>

<input id="dictWord">

<button onclick="lookupWord()">Search</button>

<div id="dictResult"></div>

</div>


<!-- ===================== TABLES ===================== -->

<div id="tablesTab" class="card hidden">

<h3>Grammar Tables</h3>

<table class="table">
<tr><th>Case</th><th>Masculine</th><th>Feminine</th><th>Neuter</th></tr>
<tr><td>Nominativ</td><td>der</td><td>die</td><td>das</td></tr>
<tr><td>Akkusativ</td><td class="hl">den</td><td>die</td><td>das</td></tr>
<tr><td>Dativ</td><td class="hl">dem</td><td class="hl">der</td><td class="hl">dem</td></tr>
</table>

</div>


<script>

/* ================= TAB SYSTEM ================= */

function showTab(id){

document.querySelectorAll('.card').forEach(el=>{
el.classList.add('hidden')
})

document.getElementById(id).classList.remove('hidden')

}

/* ================= THEME ================= */

function setTheme(theme){

document.body.className=theme

localStorage.setItem("theme",theme)

}

(function(){
let t=localStorage.getItem("theme")
if(t)document.body.className=t
})()

/* ================= TYPING ================= */

let startTime=null

function updateStats(){

let txt=document.getElementById("practiceArea").value

if(!startTime)startTime=Date.now()

let time=(Date.now()-startTime)/60000

let wpm=Math.round((txt.length/5)/time)

document.getElementById("wpm").innerText=wpm||0

}

/* ================= FLASHCARDS ================= */

let flashcards=[]
let fcIndex=0
let flipped=false

async function loadFlashcards(){

try{

let res=await fetch("flashcards.json")

let data=await res.json()

flashcards=data.cards||[]

updateCard()

}catch{}

}

function updateCard(){

if(!flashcards.length)return

document.getElementById("fcText").innerText=
flipped?flashcards[fcIndex].back:flashcards[fcIndex].front

}

function flipCard(){

flipped=!flipped

updateCard()

}

function nextCard(){

fcIndex=(fcIndex+1)%flashcards.length

flipped=false

updateCard()

}

/* ================= TRANSLATOR ================= */

async function translateText(){

let txt=document.getElementById("translateInput").value

let sl=document.getElementById("langFrom").value
let tl=document.getElementById("langTo").value

let url=
"https://translate.googleapis.com/translate_a/single?client=gtx&sl="+sl+"&tl="+tl+"&dt=t&q="+encodeURIComponent(txt)

let r=await fetch(url)

let d=await r.json()

document.getElementById("translateOutput").value=d[0].map(x=>x[0]).join("")

}

/* ================= DICTIONARY ================= */

async function lookupWord(){

let w=document.getElementById("dictWord").value

let url="https://de.wiktionary.org/w/api.php?action=query&format=json&prop=extracts&explaintext=1&titles="+w+"&origin=*"

let r=await fetch(url)

let d=await r.json()

let page=Object.values(d.query.pages)[0]

document.getElementById("dictResult").innerText=page.extract||"Not found"

}

/* ================= PERSONAL NOTES ================= */

function savePersonalNotes(){

localStorage.setItem(
"personalNotes",
document.getElementById("personalNotesArea").value
)

}

(function(){

let p=localStorage.getItem("personalNotes")

if(p)document.getElementById("personalNotesArea").value=p

})()

loadFlashcards()

</script>

</body>
</html>
